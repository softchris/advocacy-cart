<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdvoCart — Level Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #0d1117; color: #c9d1d9; overflow: hidden; height: 100vh;
  display: flex; flex-direction: column;
}

/* Toolbar */
#toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; background: #161b22;
  border-bottom: 1px solid #30363d; flex-shrink: 0;
}
#toolbar input[type="text"] {
  background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
  padding: 6px 12px; border-radius: 6px; font-size: 14px;
}
#toolbar input[type="text"]:focus { border-color: #58a6ff; outline: none; }
#toolbar button {
  background: #238636; color: #fff; border: none; padding: 6px 14px;
  border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
}
#toolbar button:hover { background: #2ea043; }
#toolbar button.secondary { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; }
#toolbar button.secondary:hover { background: #30363d; }
#toolbar button.danger { background: #da3633; }
#toolbar button.danger:hover { background: #f85149; }
#toolbar .separator { width: 1px; height: 24px; background: #30363d; }
#toolbar label { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 4px; }
#toolbar input[type="number"] {
  background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
  padding: 4px 8px; border-radius: 4px; width: 50px; font-size: 12px;
}

/* Main area */
#main {
  display: flex; flex: 1; overflow: hidden;
}

/* Canvas area */
#canvas-container {
  flex: 1; position: relative; overflow: hidden;
  background: #010409;
}
#editor-canvas {
  display: block; cursor: crosshair;
}
#canvas-info {
  position: absolute; bottom: 8px; left: 8px;
  font-size: 11px; color: #484f58;
}

/* Right sidebar */
#sidebar {
  width: 260px; background: #161b22; border-left: 1px solid #30363d;
  overflow-y: auto; flex-shrink: 0; padding: 12px;
}
#sidebar h3 {
  font-size: 12px; color: #8b949e; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 8px; margin-top: 16px;
}
#sidebar h3:first-child { margin-top: 0; }

.tool-group {
  display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px;
}
.tool-btn {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: #21262d; border: 2px solid #30363d; border-radius: 8px;
  cursor: pointer; font-size: 20px; transition: all 0.15s;
}
.tool-btn:hover { border-color: #58a6ff; }
.tool-btn.active { border-color: #3fb950; background: #0d2818; }
.tool-btn .tool-label {
  font-size: 9px; color: #8b949e; display: block; margin-top: 2px;
}

/* Settings panel */
.setting-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.setting-row label {
  font-size: 12px; color: #8b949e; width: 70px; flex-shrink: 0;
}
.setting-row input, .setting-row select {
  background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
  padding: 4px 8px; border-radius: 4px; font-size: 12px; flex: 1;
}
.setting-row input:focus, .setting-row select:focus { border-color: #58a6ff; outline: none; }

/* Control point list */
#cp-list {
  max-height: 200px; overflow-y: auto; margin-bottom: 8px;
}
.cp-item {
  display: flex; align-items: center; gap: 4px; padding: 3px 6px;
  font-size: 11px; border-radius: 4px; cursor: pointer;
}
.cp-item:hover { background: #21262d; }
.cp-item.selected { background: #0d2818; border: 1px solid #3fb950; }
.cp-item input {
  background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
  padding: 2px 4px; border-radius: 3px; width: 40px; font-size: 10px;
}

/* Mode indicator */
#mode-indicator {
  position: absolute; top: 8px; left: 8px;
  background: rgba(13,17,23,0.9); border: 1px solid #30363d;
  padding: 6px 12px; border-radius: 6px; font-size: 12px; color: #58a6ff;
}

/* Undo hint */
#undo-hint {
  position: absolute; top: 8px; right: 270px;
  font-size: 11px; color: #484f58;
}
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <input type="text" id="level-name" placeholder="Level Name" value="My Level" style="width:140px;">
  <div class="separator"></div>
  <button id="btn-save" class="secondary">💾 Save</button>
  <button id="btn-load" class="secondary">📂 Load</button>
  <button id="btn-export">📤 Export JSON</button>
  <button id="btn-test">🎮 Test in Game</button>
  <div class="separator"></div>
  <label>Laps: <input type="number" id="input-laps" value="5" min="1" max="99"></label>
  <label>Width: <input type="number" id="input-width" value="14" min="6" max="30"></label>
  <div class="separator"></div>
  <button id="btn-undo" class="secondary" title="Undo (Ctrl+Z)">↩</button>
  <button id="btn-redo" class="secondary" title="Redo (Ctrl+Shift+Z)">↪</button>
</div>

<!-- Main area -->
<div id="main">
  <div id="canvas-container">
    <canvas id="editor-canvas"></canvas>
    <div id="mode-indicator">Mode: Select</div>
    <div id="canvas-info">Scroll to zoom • Middle-drag to pan • Click to place</div>
    <div id="undo-hint">Ctrl+Z undo • Ctrl+Shift+Z redo • Del remove</div>
  </div>
  <div id="sidebar">
    <h3>🛠️ Tools</h3>
    <div class="tool-group" id="tool-modes">
      <div class="tool-btn active" data-mode="select" title="Select/Move">🖱️</div>
      <div class="tool-btn" data-mode="path" title="Place Control Points">📍</div>
      <div class="tool-btn" data-mode="paint" title="Paint Tiles">🖌️</div>
      <div class="tool-btn" data-mode="object" title="Place Objects">📦</div>
    </div>

    <h3>🎨 Tile Palette</h3>
    <div class="tool-group" id="tile-palette">
      <div class="tool-btn active" data-tile="road" title="Road">🛣️</div>
      <div class="tool-btn" data-tile="water" title="Water">🌊</div>
      <div class="tool-btn" data-tile="sand" title="Sand">🏜️</div>
      <div class="tool-btn" data-tile="grass" title="Grass">🌿</div>
    </div>

    <h3>📦 Objects</h3>
    <div class="tool-group" id="object-palette">
      <div class="tool-btn active" data-obj="rock" title="Rock">🪨</div>
      <div class="tool-btn" data-obj="pole" title="Pole">🔵</div>
      <div class="tool-btn" data-obj="boost" title="Speed Boost">⚡</div>
      <div class="tool-btn" data-obj="start" title="Start/Finish">🏁</div>
      <div class="tool-btn" data-obj="palm" title="Palm Tree">🌴</div>
      <div class="tool-btn" data-obj="pine" title="Pine Tree">🌲</div>
      <div class="tool-btn" data-obj="umbrella" title="Umbrella">☂️</div>
    </div>

    <h3>📍 Control Points</h3>
    <div id="cp-list"></div>
    <button id="btn-clear-path" class="secondary" style="width:100%;padding:4px;font-size:11px;margin-bottom:8px;">Clear All Points</button>

    <h3>⚙️ Level Settings</h3>
    <div class="setting-row">
      <label>Desc:</label>
      <input type="text" id="input-desc" value="A custom track">
    </div>
    <div class="setting-row">
      <label>Emoji:</label>
      <input type="text" id="input-emoji" value="🏁" style="width:40px;">
    </div>
    <div class="setting-row">
      <label>Type:</label>
      <select id="input-type">
        <option value="circuit">Circuit</option>
        <option value="space">Space</option>
        <option value="beach">Beach</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Sky:</label>
      <input type="color" id="input-sky" value="#87ceeb" style="width:40px;padding:0;height:24px;">
    </div>
    <div class="setting-row">
      <label>Ground:</label>
      <input type="color" id="input-ground" value="#1a7f37" style="width:40px;padding:0;height:24px;">
    </div>
    <div class="setting-row">
      <label>Fog Near:</label>
      <input type="number" id="input-fog-near" value="80" min="10" max="500">
    </div>
    <div class="setting-row">
      <label>Fog Far:</label>
      <input type="number" id="input-fog-far" value="200" min="50" max="1000">
    </div>

    <h3>✨ Special Features</h3>
    <div class="setting-row">
      <label style="width:auto;"><input type="checkbox" id="chk-rainbow"> Rainbow Track</label>
    </div>
    <div class="setting-row">
      <label style="width:auto;"><input type="checkbox" id="chk-stars"> Stars</label>
    </div>
    <div class="setting-row">
      <label style="width:auto;"><input type="checkbox" id="chk-terrain"> Terrain Variation</label>
    </div>
    <div class="setting-row">
      <label style="width:auto;"><input type="checkbox" id="chk-water"> Water Plane</label>
    </div>

    <div class="setting-row" style="margin-top:16px;">
      <label style="width:auto;"><input type="checkbox" id="chk-snap" checked> Grid Snap</label>
    </div>
  </div>
</div>

<!-- Hidden file input for loading -->
<input type="file" id="file-input" accept=".json" style="display:none;">

<script>
// ============================================================
//  ADVOCART LEVEL EDITOR
// ============================================================

const canvas = document.getElementById('editor-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');

// State
let viewX = 0, viewY = 0, zoom = 3;
let currentMode = 'select'; // select, path, paint, object
let currentTile = 'road';
let currentObject = 'rock';
let gridSnap = true;
const GRID_SIZE = 5;

// Level data
let controlPoints = []; // {x, y, z}  (y is elevation)
let tiles = []; // {gx, gz, type}  grid coords
let objects = []; // {type, x, z, size}
let selectedCP = -1;
let selectedObj = -1;
let dragging = false;
let dragTarget = null;
let dragStartX = 0, dragStartY = 0;
let panning = false;
let panStartX = 0, panStartY = 0, panStartViewX = 0, panStartViewY = 0;

// Undo/Redo
let undoStack = [];
let redoStack = [];

function saveState() {
  undoStack.push(JSON.stringify({ controlPoints, tiles, objects }));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(JSON.stringify({ controlPoints, tiles, objects }));
  const state = JSON.parse(undoStack.pop());
  controlPoints = state.controlPoints;
  tiles = state.tiles;
  objects = state.objects;
  updateCPList();
  render();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(JSON.stringify({ controlPoints, tiles, objects }));
  const state = JSON.parse(redoStack.pop());
  controlPoints = state.controlPoints;
  tiles = state.tiles;
  objects = state.objects;
  updateCPList();
  render();
}

// Coordinate transforms
function worldToScreen(wx, wz) {
  const sx = (wx - viewX) * zoom + canvas.width / 2;
  const sy = (wz - viewY) * zoom + canvas.height / 2;
  return [sx, sy];
}

function screenToWorld(sx, sy) {
  const wx = (sx - canvas.width / 2) / zoom + viewX;
  const wz = (sy - canvas.height / 2) / zoom + viewY;
  return [wx, wz];
}

function snapToGrid(v) {
  return gridSnap ? Math.round(v / GRID_SIZE) * GRID_SIZE : v;
}

// Catmull-Rom spline evaluation
function catmullRomPoint(p0, p1, p2, p3, t) {
  const t2 = t * t, t3 = t2 * t;
  const x = 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3);
  const z = 0.5 * ((2*p1.z) + (-p0.z + p2.z)*t + (2*p0.z - 5*p1.z + 4*p2.z - p3.z)*t2 + (-p0.z + 3*p1.z - 3*p2.z + p3.z)*t3);
  return { x, z };
}

function getSplinePoints(pts, segments) {
  if (pts.length < 2) return [];
  const result = [];
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const p0 = pts[(i - 1 + n) % n];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % n];
    const p3 = pts[(i + 2) % n];
    for (let t = 0; t < segments; t++) {
      result.push(catmullRomPoint(p0, p1, p2, p3, t / segments));
    }
  }
  return result;
}

// Rendering
function render() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  const [minWX, minWZ] = screenToWorld(0, 0);
  const [maxWX, maxWZ] = screenToWorld(canvas.width, canvas.height);
  const gridStep = GRID_SIZE;
  const startGX = Math.floor(minWX / gridStep) * gridStep;
  const startGZ = Math.floor(minWZ / gridStep) * gridStep;

  for (let gx = startGX; gx <= maxWX; gx += gridStep) {
    const [sx] = worldToScreen(gx, 0);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height); ctx.stroke();
  }
  for (let gz = startGZ; gz <= maxWZ; gz += gridStep) {
    const [, sy] = worldToScreen(0, gz);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
  }

  // Origin cross
  ctx.strokeStyle = '#30363d'; ctx.lineWidth = 2;
  const [ox, oy] = worldToScreen(0, 0);
  ctx.beginPath(); ctx.moveTo(ox - 10, oy); ctx.lineTo(ox + 10, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy - 10); ctx.lineTo(ox, oy + 10); ctx.stroke();

  // Tiles
  tiles.forEach(tile => {
    const [sx, sy] = worldToScreen(tile.gx * GRID_SIZE, tile.gz * GRID_SIZE);
    const size = GRID_SIZE * zoom;
    let color;
    switch (tile.type) {
      case 'road': color = 'rgba(45, 51, 59, 0.8)'; break;
      case 'water': color = 'rgba(0, 119, 190, 0.6)'; break;
      case 'sand': color = 'rgba(194, 178, 128, 0.7)'; break;
      case 'grass': color = 'rgba(26, 127, 55, 0.7)'; break;
      default: color = 'rgba(100,100,100,0.5)';
    }
    ctx.fillStyle = color;
    ctx.fillRect(sx - size/2, sy - size/2, size, size);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.strokeRect(sx - size/2, sy - size/2, size, size);
  });

  // Spline preview
  if (controlPoints.length >= 2) {
    const spline = getSplinePoints(controlPoints, 20);
    if (spline.length > 0) {
      ctx.strokeStyle = '#58a6ff';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      spline.forEach((p, i) => {
        const [sx, sy] = worldToScreen(p.x, p.z);
        i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
      });
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);

      // Track width preview
      const trackW = parseInt(document.getElementById('input-width').value) || 14;
      ctx.strokeStyle = 'rgba(88, 166, 255, 0.2)';
      ctx.lineWidth = trackW * zoom;
      ctx.beginPath();
      spline.forEach((p, i) => {
        const [sx, sy] = worldToScreen(p.x, p.z);
        i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
      });
      ctx.closePath();
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }

  // Control points
  controlPoints.forEach((cp, i) => {
    const [sx, sy] = worldToScreen(cp.x, cp.z);
    const r = i === selectedCP ? 8 : 6;
    ctx.fillStyle = i === selectedCP ? '#3fb950' : '#f78166';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    // Label
    ctx.fillStyle = '#c9d1d9';
    ctx.font = '10px sans-serif';
    ctx.fillText(`${i} (y:${cp.y})`, sx + 10, sy - 5);
  });

  // Objects
  objects.forEach((obj, i) => {
    const [sx, sy] = worldToScreen(obj.x, obj.z);
    const r = i === selectedObj ? 10 : 8;
    let emoji;
    switch (obj.type) {
      case 'rock': emoji = '🪨'; break;
      case 'pole': emoji = '🔵'; break;
      case 'boost': emoji = '⚡'; break;
      case 'start': emoji = '🏁'; break;
      case 'palm': emoji = '🌴'; break;
      case 'pine': emoji = '🌲'; break;
      case 'umbrella': emoji = '☂️'; break;
      default: emoji = '❓';
    }
    ctx.font = `${r * 2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(emoji, sx, sy + r * 0.7);
    if (i === selectedObj) {
      ctx.strokeStyle = '#3fb950'; ctx.lineWidth = 2;
      ctx.strokeRect(sx - r, sy - r, r * 2, r * 2);
    }
  });

  ctx.textAlign = 'left';
}

// CP list in sidebar
function updateCPList() {
  const list = document.getElementById('cp-list');
  list.innerHTML = '';
  controlPoints.forEach((cp, i) => {
    const div = document.createElement('div');
    div.className = 'cp-item' + (i === selectedCP ? ' selected' : '');
    div.innerHTML = `<span>#${i}</span> x:<input type="number" value="${cp.x}" data-i="${i}" data-f="x" step="5"> z:<input type="number" value="${cp.z}" data-i="${i}" data-f="z" step="5"> y:<input type="number" value="${cp.y}" data-i="${i}" data-f="y" step="1">`;
    div.addEventListener('click', (e) => {
      if (e.target.tagName !== 'INPUT') { selectedCP = i; updateCPList(); render(); }
    });
    div.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('change', (e) => {
        saveState();
        const idx = parseInt(e.target.dataset.i);
        const field = e.target.dataset.f;
        controlPoints[idx][field] = parseFloat(e.target.value) || 0;
        render();
      });
    });
    list.appendChild(div);
  });
}

// Event handlers
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const [wx, wz] = screenToWorld(mx, my);

  // Middle mouse = pan
  if (e.button === 1) {
    e.preventDefault();
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartViewX = viewX; panStartViewY = viewY;
    return;
  }

  if (e.button !== 0) return;

  if (currentMode === 'select') {
    // Check if clicking on a control point
    selectedCP = -1; selectedObj = -1;
    for (let i = 0; i < controlPoints.length; i++) {
      const [sx, sy] = worldToScreen(controlPoints[i].x, controlPoints[i].z);
      if (Math.hypot(mx - sx, my - sy) < 10) {
        selectedCP = i; dragTarget = { type: 'cp', index: i };
        dragging = true; break;
      }
    }
    if (!dragging) {
      for (let i = 0; i < objects.length; i++) {
        const [sx, sy] = worldToScreen(objects[i].x, objects[i].z);
        if (Math.hypot(mx - sx, my - sy) < 12) {
          selectedObj = i; dragTarget = { type: 'obj', index: i };
          dragging = true; break;
        }
      }
    }
    dragStartX = wx; dragStartY = wz;
    updateCPList(); render();
  } else if (currentMode === 'path') {
    saveState();
    const sx = snapToGrid(wx), sz = snapToGrid(wz);
    controlPoints.push({ x: sx, y: 0, z: sz });
    selectedCP = controlPoints.length - 1;
    updateCPList(); render();
  } else if (currentMode === 'paint') {
    saveState();
    const gx = Math.round(wx / GRID_SIZE);
    const gz = Math.round(wz / GRID_SIZE);
    // Remove existing tile at this position
    tiles = tiles.filter(t => t.gx !== gx || t.gz !== gz);
    tiles.push({ gx, gz, type: currentTile });
    render();
  } else if (currentMode === 'object') {
    saveState();
    const sx = snapToGrid(wx), sz = snapToGrid(wz);
    objects.push({ type: currentObject, x: sx, z: sz, size: 1.0 });
    render();
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (panning) {
    const dx = (e.clientX - panStartX) / zoom;
    const dy = (e.clientY - panStartY) / zoom;
    viewX = panStartViewX - dx;
    viewY = panStartViewY - dy;
    render();
    return;
  }
  if (dragging && dragTarget) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let [wx, wz] = screenToWorld(mx, my);
    if (gridSnap) { wx = snapToGrid(wx); wz = snapToGrid(wz); }
    if (dragTarget.type === 'cp') {
      controlPoints[dragTarget.index].x = wx;
      controlPoints[dragTarget.index].z = wz;
    } else if (dragTarget.type === 'obj') {
      objects[dragTarget.index].x = wx;
      objects[dragTarget.index].z = wz;
    }
    updateCPList(); render();
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (panning) { panning = false; return; }
  if (dragging) {
    saveState();
    dragging = false; dragTarget = null;
  }
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoom = Math.max(0.5, Math.min(20, zoom * factor));
  render();
}, { passive: false });

// Prevent context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Delete' || e.code === 'Backspace') {
    e.preventDefault();
    if (selectedCP >= 0) {
      saveState();
      controlPoints.splice(selectedCP, 1);
      selectedCP = -1;
      updateCPList(); render();
    } else if (selectedObj >= 0) {
      saveState();
      objects.splice(selectedObj, 1);
      selectedObj = -1;
      render();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  }
});

// Tool mode buttons
document.querySelectorAll('#tool-modes .tool-btn').forEach(btn => {

// Export JSON
function buildLevelJSON() {
  const name = document.getElementById('level-name').value || 'My Level';
  const desc = document.getElementById('input-desc').value || '';
  const emoji = document.getElementById('input-emoji').value || '🏁';
  const type = document.getElementById('input-type').value;
  const laps = parseInt(document.getElementById('input-laps').value) || 5;
  const trackWidth = parseInt(document.getElementById('input-width').value) || 14;
  const skyColor = document.getElementById('input-sky').value;
  const groundColor = document.getElementById('input-ground').value;
  const fogNear = parseInt(document.getElementById('input-fog-near').value) || 80;
  const fogFar = parseInt(document.getElementById('input-fog-far').value) || 200;
  const rainbow = document.getElementById('chk-rainbow').checked;
  const stars = document.getElementById('chk-stars').checked;
  const terrain = document.getElementById('chk-terrain').checked;
  const waterPlane = document.getElementById('chk-water').checked;

  // Build boost pads from objects
  const boostPads = objects.filter(o => o.type === 'boost').map(o => ({ x: o.x, z: o.z }));
  // Build obstacles
  const rocks = objects.filter(o => o.type === 'rock').map(o => ({ x: o.x, z: o.z, size: o.size || 1.2 }));
  const poles = objects.filter(o => o.type === 'pole').map(o => ({ x: o.x, z: o.z }));
  // Build scenery
  const palms = objects.filter(o => o.type === 'palm').map(o => ({ x: o.x, z: o.z }));
  const pines = objects.filter(o => o.type === 'pine').map(o => ({ x: o.x, z: o.z }));
  const umbrellas = objects.filter(o => o.type === 'umbrella').map(o => ({ x: o.x, z: o.z }));

  const json = {
    name, description: desc, emoji, type, laps, trackWidth,
    environment: {
      skyColor, fogColor: skyColor, fogNear, fogFar,
      groundColor: type === 'space' ? null : groundColor,
      groundSize: type === 'space' ? 0 : 400
    },
    controlPoints: controlPoints.map(cp => ({ x: cp.x, y: cp.y, z: cp.z })),
    tiles: [{ type: 'road', points: 'auto' }],
    trackSurface: rainbow ? { color: null, rainbow: true } : {
      color: type === 'beach' ? '#8B7355' : '#2d333b',
      laneMarking: type === 'beach' ? '#A0926B' : '#484f58',
      edgeColor: type === 'beach' ? '#C4B48A' : '#f0f6fc'
    },
    obstacles: rocks.length > 0 ? { rocks: rocks.map(r => ({ x: r.x, z: r.z, size: r.size })) } : [],
    boostPads: boostPads.length > 0
      ? boostPads.map(bp => ({ x: bp.x, z: bp.z }))
      : [{ trackFraction: 0.15 }, { trackFraction: 0.45 }, { trackFraction: 0.78 }],
    scenery: {},
    barriers: {
      spacing: 6, sides: 'both',
      color: type === 'space' ? '#58a6ff' : type === 'beach' ? '#1f6feb' : '#f85149',
      glowing: type === 'space'
    },
    specialFeatures: {
      waterPlane: waterPlane ? { width: 300, height: 400, x: 190, y: -0.2, z: 0, color: '#0077be', opacity: 0.85 } : null,
      stars, rainbowTrack: rainbow, terrainVariation: terrain
    }
  };

  return json;
}

document.getElementById('btn-export').addEventListener('click', () => {
  const json = buildLevelJSON();
  const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${json.name.replace(/\s+/g, '-').toLowerCase()}.json`;
  a.click(); URL.revokeObjectURL(url);
});

// Save to localStorage
document.getElementById('btn-save').addEventListener('click', () => {
  const json = buildLevelJSON();
  localStorage.setItem('advocart-editor-level', JSON.stringify(json));
  alert('Level saved to browser storage!');
});

// Load from file
document.getElementById('btn-load').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      loadLevelData(data);
    } catch (err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadLevelData(data) {
  saveState();
  // Populate UI from data
  document.getElementById('level-name').value = data.name || 'Loaded Level';
  document.getElementById('input-desc').value = data.description || '';
  document.getElementById('input-emoji').value = data.emoji || '🏁';
  document.getElementById('input-type').value = data.type || 'circuit';
  document.getElementById('input-laps').value = data.laps || 5;
  document.getElementById('input-width').value = data.trackWidth || 14;
  if (data.environment) {
    document.getElementById('input-sky').value = data.environment.skyColor || '#87ceeb';
    document.getElementById('input-ground').value = data.environment.groundColor || '#1a7f37';
    document.getElementById('input-fog-near').value = data.environment.fogNear || 80;
    document.getElementById('input-fog-far').value = data.environment.fogFar || 200;
  }
  if (data.specialFeatures) {
    document.getElementById('chk-rainbow').checked = !!data.specialFeatures.rainbowTrack;
    document.getElementById('chk-stars').checked = !!data.specialFeatures.stars;
    document.getElementById('chk-terrain').checked = !!data.specialFeatures.terrainVariation;
    document.getElementById('chk-water').checked = !!data.specialFeatures.waterPlane;
  }
  // Load control points
  controlPoints = (data.controlPoints || []).map(p => ({ x: p.x, y: p.y || 0, z: p.z }));
  // Load objects from various sources in JSON
  objects = [];
  if (data.obstacles && data.obstacles.rocks) {
    data.obstacles.rocks.forEach(r => {
      objects.push({ type: 'rock', x: r.x || 0, z: r.z || 0, size: r.size || 1.0 });
    });
  }
  if (data.boostPads) {
    data.boostPads.forEach(bp => {
      if (bp.x !== undefined) objects.push({ type: 'boost', x: bp.x, z: bp.z, size: 1.0 });
    });
  }
  tiles = [];
  selectedCP = -1; selectedObj = -1;
  updateCPList(); render();
}

// Test in Game
document.getElementById('btn-test').addEventListener('click', () => {
  const json = buildLevelJSON();
  localStorage.setItem('advocart-custom-level', JSON.stringify(json));
  window.open('index.html?level=custom', '_blank');
});

function resize() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  render();
}
window.addEventListener('resize', resize);

try {

  if (saved) {
    const data = JSON.parse(saved);
    loadLevelData(data);
  }
} catch (e) { /* ignore */ }

render();
